name: Debug GitHub Context

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note"
        required: false
        default: "manual run"


jobs:
  build:
    name: building
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      UV_CACHE_DIR: /tmp/.uv-cache
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4                         # fix: v7 doesn't exist
        with:
          fetch-depth: 0
 
      - name: Set up Python
        uses: actions/setup-python@v5                    # fix: was `run:` instead of `uses:`, and v6 doesn't exist
        with:
          python-version: ${{ matrix.python-version }}
 
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true                             # this already manages the uv cache internally
          cache-dependency-glob: "uv.lock"              # optional: invalidate cache when lockfile changes
 

  debug:
    name: debugging
    runs-on: ubuntu-latest
    steps:
      - name: Print selected github.* variables
        run: |
          echo "actor         = ${{ github.actor }}"
          echo "repository    = ${{ github.repository }}"
          echo "workflow      = ${{ github.workflow }}"
          echo "run_id        = ${{ github.run_id }}"
          echo "run_number    = ${{ github.run_number }}"
          echo "sha           = ${{ github.sha }}"
          echo "ref           = ${{ github.ref }}"
          echo "ref_name      = ${{ github.ref_name }}"
          echo "event_name    = ${{ github.event_name }}"

      - name: Print full github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "$GITHUB_CONTEXT"